user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;
events { worker_connections 1024; use epoll; multi_accept on; }
http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    log_format main '$remote_addr - $remote_user [$time_local] "$request" $status $body_bytes_sent';
    access_log /var/log/nginx/access.log main;
    sendfile on; tcp_nopush on; tcp_nodelay on; keepalive_timeout 65;
    gzip on; gzip_vary on; gzip_comp_level 6;
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    upstream api_servers { server api:8000; }
    server {
        listen 80; server_name shadowsurface.io;
        location /.well-known/acme-challenge/ { root /var/www/certbot; }
        location / { return 301 https://$server_name$request_uri; }
    }
    server {
        listen 443 ssl http2; server_name shadowsurface.io;
        ssl_certificate /etc/nginx/ssl/live/shadowsurface.io/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/live/shadowsurface.io/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        location / { root /usr/share/nginx/html; index index.html; }
        location /api/ { limit_req zone=api_limit burst=20 nodelay; proxy_pass http://api_servers/; }
    }
}