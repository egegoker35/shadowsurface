# Nginx config for ShadowSurface
# Replace shadowsurface.com with your actual domain

upstream nextjs_app {
    server app:3000;
}

server {
    listen 80;
    server_name shadowsurface.com www.shadowsurface.com;

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name shadowsurface.com www.shadowsurface.com;

    ssl_certificate /etc/letsencrypt/live/shadowsurface.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/shadowsurface.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 10M;

    location / {
        proxy_pass http://nextjs_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }

    location /api/health {
        proxy_pass http://nextjs_app;
        proxy_set_header Host $host;
        access_log off;
    }
}
